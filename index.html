    <script>
        const DATA_URL = 'datos/datos.json';
        let datosApp = null, currentSector = null, navigationStack = [], swiperBloques = null;

        // ====================== PALETA ARCOÍRIS ACTUALIZADA ======================
        function getColorByGrado(grado) {
            if (!grado) return '#FF93DB'; // Comodín rosa bebé
            const g = grado.toUpperCase().trim();
            
            // Pr → Negro
            if (g === 'PR') return '#212121';
            
            // Extraer número y letra
            const match = g.match(/(\d+)([A-Z]?)(\+?)/);
            if (!match) return '#FF93DB';
            
            const num = parseInt(match[1], 10);
            const letra = match[2] || '';
            const mas = match[3] || '';
            
            // Grados 3, 4 - Amarillo limón
            if (num === 3 || num === 4) return '#FADF00';
            
            // Grados 5, 5+ - Verde lima
            if (num === 5) return '#8CDB00';
            
            // Grados 6
            if (num === 6) {
                if (letra === 'A') return '#00BD48';      // 6A, 6A+
                if (letra === 'A' && mas === '+') return '#00BD48';
                if (letra === 'B') return '#00ADD4';      // 6B, 6B+
                if (letra === 'B' && mas === '+') return '#00ADD4';
                if (letra === 'C') return '#0055DB';      // 6C, 6C+
                if (letra === 'C' && mas === '+') return '#0055DB';
            }
            
            // Grados 7
            if (num === 7) {
                if (letra === 'A') return '#7C00DB';      // 7A, 7A+
                if (letra === 'A' && mas === '+') return '#7C00DB';
                if (letra === 'B') return '#CA00DB';      // 7B, 7B+
                if (letra === 'B' && mas === '+') return '#CA00DB';
                if (letra === 'C') return '#B30040';      // 7C, 7C+
                if (letra === 'C' && mas === '+') return '#B30040';
            }
            
            // Grados 8
            if (num === 8) {
                if (letra === 'A') return '#DC0A00';      // 8A, 8A+
                if (letra === 'A' && mas === '+') return '#DC0A00';
                if (letra === 'B') return '#DB5300';      // 8B, 8B+
                if (letra === 'B' && mas === '+') return '#DB5300';
                if (letra === 'C') return '#DB8800';      // 8C, 8C+
                if (letra === 'C' && mas === '+') return '#DB8800';
            }
            
            // Grados superiores (por si acaso)
            if (num > 8) return '#FF9800';
            
            return '#FF93DB';
        }

        // ... El resto del JavaScript (dibujarGrafica, getSalidaSymbol, etc.) es igual que en el mensaje anterior ...
    </script>
